<body>
    <div class="container">
        <header>
            <h1>AI Efficiency <span class="highlight">Tracker</span></h1>
            <p>Optimize your life with data-driven insights.</p>
        </header>

```
    <main class="grid-layout">

        <!-- Efficiency Overview -->
        <section class="card efficiency-card">
            <h2>Efficiency Overview</h2>

            <div class="chart-container">
                <canvas id="efficiencyChart"></canvas>
            </div>

            <div id="stats-text" class="stats-grid">
                <!-- Stats injected by JS -->
            </div>
        </section>

        <!-- Actions Panel -->
        <section class="card actions-card">

            <div class="tabs">
                <button class="tab-btn active" data-tab="log-tab">Log Activity</button>
                <button class="tab-btn" data-tab="goal-tab">Set Goals</button>
                <button class="tab-btn" data-tab="train-tab">Train AI</button>
            </div>

            <!-- Log Activity -->
            <div id="log-tab" class="tab-content active">
                <form id="logForm">

                    <div class="input-group">
                        <label>Activity Name</label>
                        <input type="text" id="activityName" placeholder="e.g. Coding Python" required>
                    </div>

                    <div id="ai-suggestion" class="ai-chip hidden">
                        AI Suggestion: <span id="suggested-cat">Work</span>
                        <button type="button" id="accept-ai">✔</button>
                    </div>

                    <div class="input-group">
                        <label>Category</label>
                        <input type="text" id="category" placeholder="e.g. Work" required>
                    </div>

                    <div class="input-group">
                        <label>Duration (minutes)</label>
                        <input type="number" id="duration" placeholder="60" required>
                    </div>

                    <button type="submit" class="btn-primary">Log Activity</button>

                </form>
            </div>

            <!-- Set Goals -->
            <div id="goal-tab" class="tab-content">
                <form id="goalForm">

                    <div class="input-group">
                        <label>Category</label>
                        <input type="text" id="goalCategory" placeholder="e.g. Work" required>
                    </div>

                    <div class="input-group">
                        <label>Target Hours / Week</label>
                        <input type="number" id="goalHours" step="0.1" placeholder="40" required>
                    </div>

                    <button type="submit" class="btn-secondary">Update Goal</button>

                </form>
            </div>

            <!-- Train AI -->
            <div id="train-tab" class="tab-content">
                <p>Train the AI model on your recent history for better categorization.</p>
                <button id="trainBtn" class="btn-accent">Train Model</button>
            </div>

        </section>
    </main>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast hidden">Message here</div>

<!-- Correct Flask JS Link -->
<script src="{{ url_for('static', filename='script.js') }}"></script>
```
